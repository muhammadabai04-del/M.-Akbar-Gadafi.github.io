<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akbar Gadafi | Ethical Hacker Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
background:#000;
color:#00ff88;
}

nav{
padding:15px;
border-bottom:1px solid #00ff88;
text-align:center;
}

nav a{
color:#00ff88;
margin:0 10px;
text-decoration:none;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
border:1px solid #00ff88;
padding:25px;
margin-top:25px;
}

.terminal{
background:black;
border:1px solid #00ff88;
padding:20px;
margin-top:20px;
}

#terminal-output{
min-height:150px;
margin-bottom:10px;
}

#terminal-input{
background:black;
border:none;
color:#00ff88;
width:100%;
outline:none;
}

.chatbox{
border:1px solid #00ff88;
padding:20px;
margin-top:20px;
}

input{
background:black;
border:1px solid #00ff88;
color:#00ff88;
padding:8px;
width:100%;
margin-top:10px;
}

button{
background:#00ff88;
border:none;
padding:8px 15px;
margin-top:10px;
cursor:pointer;
}

footer{
text-align:center;
padding:30px;
margin-top:40px;
border-top:1px solid #00ff88;
}

</style>

</head>

<body>

<nav>

<a href="#" onclick="showPage('home')">home</a>
<a href="#" onclick="showPage('terminal')">terminal</a>
<a href="#" onclick="showPage('chatbot')">ai</a>
<a href="#" onclick="showPage('masjid')">masjid</a>

</nav>

<!-- HOME -->

<div id="home" class="container page">

<div class="card">

<h1>root@akbar:~# welcome</h1>

<p>M. Akbar Gadafi</p>
<p>Ethical Hacker | Web Developer | Santri</p>

<p>Instagram: @Dave_fieee</p>
<p>Email: muhammadabai04@gmail.com</p>

</div>

</div>

<!-- TERMINAL -->

<div id="terminal" class="container page" style="display:none">

<div class="card">

<h2>interactive terminal</h2>

<div class="terminal">

<div id="terminal-output"></div>

<input id="terminal-input" placeholder="type command...">

</div>

</div>

<div class="card">

<h2>network scan result</h2>

<div id="scan"></div>

</div>

<div class="card">

<h2>visitor info</h2>

<div id="visitor"></div>

</div>

</div>

<!-- CHATBOT -->

<div id="chatbot" class="container page" style="display:none">

<div class="card">

<h2>AI Chatbot Islami</h2>

<input id="chatInput" placeholder="Tanya tentang Islam...">

<button onclick="askAI()">Kirim</button>

<p id="chatOutput"></p>

</div>

</div>

<!-- MASJID -->

<div id="masjid" class="container page" style="display:none">

<div class="card">

<h2>Masjid Locator</h2>

<button onclick="getLocation()">Scan Masjid Terdekat</button>

<br><br>

<iframe id="mapFrame" width="100%" height="350" style="border:0"></iframe>

</div>

</div>

<footer>

<p>© 2026 Akbar Gadafi</p>

</footer>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.style.display="none";
});

document.getElementById(page).style.display="block";

}

/* TERMINAL */

const input=document.getElementById("terminal-input");
const output=document.getElementById("terminal-output");

input.addEventListener("keypress",function(e){

if(e.key==="Enter"){

let cmd=input.value.toLowerCase();

output.innerHTML+="<div>> "+cmd+"</div>";

if(cmd==="help"){
output.innerHTML+="commands: about skills projects dua scan visitor clear";
}

else if(cmd==="about"){
output.innerHTML+="M. Akbar Gadafi - Ethical Hacker Portfolio";
}

else if(cmd==="skills"){
output.innerHTML+="html css javascript cybersecurity basic";
}

else if(cmd==="projects"){
output.innerHTML+="islamic website | todo app | mosque website";
}

else if(cmd==="dua"){
output.innerHTML+="Doa: Allahumma inni as'aluka ilman nafi'an...";
}

else if(cmd==="scan"){
startScan();
}

else if(cmd==="visitor"){
showVisitor();
}

else if(cmd==="clear"){
output.innerHTML="";
}

input.value="";

}

});

/* NETWORK SCAN VISUAL */

function startScan(){

let scan=document.getElementById("scan");

scan.innerHTML="scanning network...<br>";

let devices=[
"192.168.1.1 router",
"192.168.1.5 laptop",
"192.168.1.10 phone"
];

devices.forEach(d=>{
scan.innerHTML+="device found: "+d+"<br>";
});

}

/* VISITOR INFO */

function showVisitor(){

let info=
"Browser: "+navigator.userAgent;

document.getElementById("visitor").innerText=info;

}

/* AI CHATBOT */

function askAI(){

let q=document.getElementById("chatInput").value.toLowerCase();

let ans="Maaf saya belum tahu.";

if(q.includes("doa")){
ans="Doa sebelum belajar: Allahumma inni as'aluka 'ilman nafi'an...";
}

if(q.includes("shalat")){
ans="Shalat wajib ada 5 waktu: Subuh, Dzuhur, Ashar, Maghrib, Isya.";
}

if(q.includes("puasa")){
ans="Puasa Ramadhan adalah kewajiban bagi muslim yang mampu.";
}

document.getElementById("chatOutput").innerText=ans;

}

/* MASJID LOCATOR */

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

document.getElementById("mapFrame").src=
"https://maps.google.com/maps?q=masjid&ll="+lat+","+lon+"&z=15&output=embed";

});

}

}

</script>

</body>
</html>
